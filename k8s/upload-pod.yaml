apiVersion: v1
kind: Pod
metadata:
  name: upload-helper
  namespace: diya
  labels:
    app: llmservingsim-eval
    component: upload-helper
spec:
  restartPolicy: Never
  containers:
  - name: uploader
    image: ubuntu:22.04
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: llmservingsim-eval-pvc
