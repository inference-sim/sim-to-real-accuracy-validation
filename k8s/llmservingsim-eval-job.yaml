apiVersion: batch/v1
kind: Job
metadata:
  name: llmservingsim-eval
  namespace: diya
  annotations:
    gpu-reaper.io/exclude: "true"
  labels:
    app: llmservingsim-eval
    component: evaluation
spec:
  # Job completion settings
  completions: 1
  parallelism: 1
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800  # Keep for 7 days

  # 7-day timeout (604800 seconds)
  activeDeadlineSeconds: 604800

  template:
    metadata:
      labels:
        app: llmservingsim-eval
        component: evaluation
    spec:
      restartPolicy: Never

      containers:
      - name: llmservingsim
        image: ubuntu:22.04

        # Command to run evaluation
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            # Install dependencies
            echo "Installing dependencies..."
            apt-get update -qq
            apt-get install -y -qq build-essential cmake git python3 python3-pip wget curl

            # Install Go 1.23 (Ubuntu 22.04 ships with Go 1.18 which is too old)
            echo "Installing Go 1.23..."
            wget -q https://go.dev/dl/go1.23.0.linux-amd64.tar.gz
            rm -rf /usr/local/go
            tar -C /usr/local -xzf go1.23.0.linux-amd64.tar.gz
            rm go1.23.0.linux-amd64.tar.gz
            export PATH=$PATH:/usr/local/go/bin
            go version

            # Upgrade pip and setuptools first (chakra requires setuptools>=77.0.1)
            pip3 install -q --upgrade pip setuptools wheel

            pip3 install -q numpy==1.23.5 pandas==1.5.3 matplotlib==3.5.3 pyyaml \
              pyinstrument transformers datasets msgspec scikit-learn xgboost==3.1.2

            # Create python symlink (LLMServingSim expects 'python' command)
            ln -s /usr/bin/python3 /usr/bin/python

            # Clone and build inference-sim (BLIS)
            echo "Cloning and building inference-sim..."
            export PATH=$PATH:/usr/local/go/bin
            if [ ! -d /data/inference-sim ]; then
              cd /data
              git clone -b training --depth 1 https://github.com/inference-sim/inference-sim.git
              cd /data/inference-sim
              echo "Building BLIS with Go $(go version)..."
              go build -o blis
              echo "BLIS build complete: $(ls -lh blis)"
            else
              echo "inference-sim already cloned, checking for binary..."
              if [ ! -f /data/inference-sim/blis ]; then
                cd /data/inference-sim
                echo "Building BLIS with Go $(go version)..."
                go build -o blis
                echo "BLIS build complete: $(ls -lh blis)"
              else
                echo "BLIS binary already exists: $(ls -lh /data/inference-sim/blis)"
              fi
            fi

            # Create binary symlink (LLMServingSim expects specific path structure)
            echo "Setting up binary symlinks..."
            cd /data/LLMServingSim/LLMServingSim/astra-sim/build/astra_analytical/build
            mkdir -p AnalyticalAstra/bin
            ln -sf /data/LLMServingSim/LLMServingSim/astra-sim/build/astra_analytical/build/bin/AstraSim_Analytical_Congestion_Aware \
              AnalyticalAstra/bin/AnalyticalAstra

            # Verify data exists
            echo "Verifying data on PVC..."
            ls -lh /data/
            test -d /data/vllm_data/ground_truth || { echo "ERROR: Ground truth data not found"; exit 1; }
            test -d /data/LLMServingSim/LLMServingSim || { echo "ERROR: LLMServingSim not found"; exit 1; }
            test -d /data/experiment/experiment || { echo "ERROR: Experiment scripts not found"; exit 1; }
            test -f /data/LLMServingSim/LLMServingSim/astra-sim/build/astra_analytical/build/bin/AstraSim_Analytical_Congestion_Aware || { echo "ERROR: astra-sim not compiled"; exit 1; }
            test -f /data/inference-sim/blis || { echo "ERROR: BLIS binary not found"; exit 1; }

            # Run evaluation
            echo "Starting BLIS and LLMServingSim evaluation (2000 requests)..."
            cd /data/experiment
            python3 -m experiment.run \
              --adapters blis-roofline llmservingsim \
              --data-dir /data/vllm_data/ground_truth \
              --blis-binary /data/inference-sim/blis \
              --llmservingsim-dir /data/LLMServingSim/LLMServingSim \
              --output-dir /data/results \
              --no-docker \
              --verbose \
              --max-requests-per-experiment 2000

            echo "Evaluation complete!"
            echo "Results written to /data/results/"
            ls -lh /data/results/

        # Environment variables
        env:
        - name: PYTHONPATH
          value: "/data/experiment"
        - name: OMP_NUM_THREADS
          value: "16"
        - name: PYTHONUNBUFFERED
          value: "1"

        # Resource requests and limits
        resources:
          requests:
            cpu: "16"
            memory: "32Gi"
          limits:
            cpu: "16"
            memory: "32Gi"

        # Mount PVC
        volumeMounts:
        - name: data
          mountPath: /data

      # PVC volume
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: llmservingsim-eval-pvc
