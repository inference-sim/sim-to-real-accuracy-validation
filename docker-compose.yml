version: '3.8'

services:
  llmservingsim:
    image: astrasim/tutorial-micro2024
    container_name: llmservingsim-container
    volumes:
      # Mount LLMServingSim directory
      - ./LLMServingSim:/app/LLMServingSim
      # Mount ground truth data (read-only)
      - ./vllm_data:/app/vllm_data:ro
      # Mount temp directory for workload/config files
      - /tmp:/tmp
    working_dir: /app/LLMServingSim
    # Keep container running
    command: tail -f /dev/null
    stdin_open: true
    tty: true
